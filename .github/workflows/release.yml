name: Release Portable Zip

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore RoosterAudioSwitcher.sln

      - name: Publish win-x64 portable
        run: >
          dotnet publish RoosterAudioSwitcher.csproj
          -c Release
          -r win-x64
          --self-contained false
          -o publish/win-x64

      - name: Package zip and checksum
        id: package
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          $zipName = "RoosterAudioSwitcher-$version-win-x64-portable.zip"
          Compress-Archive -Path "publish/win-x64/*" -DestinationPath $zipName -Force

          $hash = (Get-FileHash $zipName -Algorithm SHA256).Hash
          $checksumFile = "SHA256SUMS.txt"
          "$hash  $zipName" | Out-File -FilePath $checksumFile -Encoding ascii

          "zip_name=$zipName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "checksum_name=$checksumFile" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Create draft GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            ${{ steps.package.outputs.zip_name }}
            ${{ steps.package.outputs.checksum_name }}
